name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — unit · integration · build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: server

      - name: Unit tests
        run: npm test
        working-directory: server

      - name: Integration tests
        run: npm run test:integration
        working-directory: server
        env:
          TEST_PG_URL: postgresql://postgres:postgres@localhost:5432/postgres

      - name: TypeScript build
        run: npm run build
        working-directory: server

  frontend:
    name: Frontend — unit · lint · build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: medica-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: medica-app

      - name: Unit tests
        run: npm test -- --no-file-parallelism
        working-directory: medica-app

      - name: Lint
        run: npm run lint
        working-directory: medica-app

      - name: Vite build
        run: npm run build
        working-directory: medica-app

  e2e:
    name: E2E — Playwright (chromium)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            medica-app/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Install frontend dependencies
        run: npm ci
        working-directory: medica-app

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: medica-app

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: medica-app
        env:
          CI: 'true'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: medica-app/test-results/
          retention-days: 7
