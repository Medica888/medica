services:
  postgres:
    image: postgres:16
    container_name: medica-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: medica
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - medica-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medica"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: medica-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@medica.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - medica-net
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: medica-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - medica-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit
    container_name: medica-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP — point server/.env's SMTP_HOST/SMTP_PORT here
      - "8025:8025" # Web UI — view caught auth emails at http://localhost:8025
    networks:
      - medica-net

volumes:
  postgres_data:
  pgadmin_data:

networks:
  medica-net:
    driver: bridge
